<div id="cash-delivery-section" style="display:none;">

        <button class="btn" onclick="setCashAmount(100)" style="background:transparent;border:1px solid var(--primary);color:var(--primary);grid-column:span 2;" type="button">Bezahlen mit 100 €</button>

            <input class="form-input" id="custom-cash-input" placeholder="z.B. 20" style="flex:1;" type="number"/>
            <button class="btn" onclick="submitCustomCash()" style="padding:0 1.5rem;" type="button">Bestätigen</button>

<script src="js/config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
        const STORE_COORDS = { lat: CONFIG.coords.lat, lon: CONFIG.coords.lng };
        firebase.initializeApp(CONFIG.firebase);
        const db = firebase.database();

        // ── SINGLE SOURCE OF TRUTH ──────────────────────────────────────────
        // orderCart is the canonical state. All VAT and receipt text are derived from it.
        const orderCart = { items: [], deliveryFee: 0 };
        const round2 = v => Math.round(v * 100) / 100;

        const BEVERAGES_KW = ['coca-cola','fanta','sprite','water','wasser','shake','soda','drink',
                              'cola','juice','lemon','beer','bier','kaffee','coffee','tea','tee','milkshake','mineral'];

        function classifyItem(item) {
            if (item.foodGross !== undefined || item.beverageGross !== undefined) {
                return { foodGross: item.foodGross || 0, beverageGross: item.beverageGross || 0 };
            }
            const isBev = BEVERAGES_KW.some(k => item.name.toLowerCase().includes(k));
            return isBev ? { foodGross: 0, beverageGross: item.price }
                         : { foodGross: item.price, beverageGross: 0 };
        }

        function recalculateOrder() {
            let net_food = 0, vat_7 = 0, net_bev = 0, vat_19 = 0, items_gross = 0;

            orderCart.items.forEach(item => {
                const { foodGross, beverageGross } = classifyItem(item);
                if (foodGross > 0) {
                    const net = round2(foodGross / 1.07);
                    net_food += net;
                    vat_7    += round2(foodGross - net);
                }
                if (beverageGross > 0) {
                    const net = round2(beverageGross / 1.19);
                    net_bev  += net;
                    vat_19   += round2(beverageGross - net);
                }
                items_gross = round2(items_gross + item.price);
            });

            net_food = round2(net_food); vat_7  = round2(vat_7);
            net_bev  = round2(net_bev);  vat_19 = round2(vat_19);

            const delivery_gross = round2(orderCart.deliveryFee);
            const delivery_net   = round2(delivery_gross / 1.19);
            const delivery_vat   = round2(delivery_gross - delivery_net);

            const total_vat   = round2(vat_7 + vat_19 + delivery_vat);
            const gross_total = round2(items_gross + delivery_gross);

            return { net_food, vat_7, net_bev, vat_19, items_gross,
                     delivery_gross, delivery_net, delivery_vat, total_vat, gross_total };
        }

        function renderReceipt(totals) {
            let out = orderCart.items.map(item => {
                let line = `- ${item.name} (€${item.price.toFixed(2)})`;
                if (item.note && item.note.trim()) line += ` [${item.note.trim()}]`;
                return line;
            }).join('\n');

            out += `\n\nItems Total: €${totals.items_gross.toFixed(2)}`;
            if (totals.delivery_gross > 0) out += `\n\nDelivery Fee: €${totals.delivery_gross.toFixed(2)}`;
            out += `\n\n--- VAT Breakdown ---\n`;
            if (totals.net_food > 0) out += `\nNet Food: €${totals.net_food.toFixed(2)}\nVAT (7% Food): €${totals.vat_7.toFixed(2)}`;
            if (totals.net_bev  > 0) out += `\n\nNet Drinks: €${totals.net_bev.toFixed(2)}\nVAT (19% Drinks): €${totals.vat_19.toFixed(2)}`;
            if (totals.delivery_gross > 0) out += `\n\nNet Delivery: €${totals.delivery_net.toFixed(2)}\nVAT (19% Delivery): €${totals.delivery_vat.toFixed(2)}`;
            out += `\n\nTotal VAT: €${totals.total_vat.toFixed(2)}`;
            out += `\n\nFinal Total: €${totals.gross_total.toFixed(2)}`;

            document.getElementById('items-field').value = out;
        }

        function onCartUpdate() {
            const totals = recalculateOrder();
            renderReceipt(totals);
            const totalEl = document.getElementById('final-total-display');
            totalEl.textContent = `€${totals.gross_total.toFixed(2)}`;
            totalEl.dataset.subtotal = totals.items_gross;
        }

        // ── DISTANCE / DELIVERY FEE ─────────────────────────────────────────
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R    = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a    = Math.sin(dLat/2)**2 +
                         Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function updateDeliveryFee() {
            const address  = document.getElementById('address-field').value;
            const statusEl = document.getElementById('delivery-status');
            if (address.length < 10) return;

            statusEl.innerText = "Calculating distance... 🚚";
            statusEl.style.color = "var(--primary)";

            try {
                const res  = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address + ", Solingen, Germany")}&format=json&limit=1`,
                    { headers: { 'User-Agent': 'ByteBurgers-Order-System' } }
                );
                const data = await res.json();

                if (data.length > 0) {
                    const lat = parseFloat(data[0].lat), lon = parseFloat(data[0].lon);
                    const distance = calculateDistance(STORE_COORDS.lat, STORE_COORDS.lon, lat, lon);
                    const fee = distance < 5 ? 2.00 : 3.50;
                    orderCart.deliveryFee = fee;
                    document.getElementById('items-field').dataset.distanceKm = distance.toFixed(2);
                    statusEl.innerText = `Distance: ${distance.toFixed(1)}km. Delivery Fee: €${fee.toFixed(2)} ✅`;
                    statusEl.style.color = "#44ff44";
                } else {
                    orderCart.deliveryFee = 3.50;
                    statusEl.innerText = "Could not verify address. Defaulting to €3.50 fee.";
                    statusEl.style.color = "#ffaa00";
                }
            } catch {
                orderCart.deliveryFee = 3.50;
                statusEl.innerText = "Error calculating distance. Defaulting to €3.50 fee.";
            }
            onCartUpdate();
        }

        // ── INIT ────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            // Primary: load structured cart set by main.js doCheckout()
            const storedCart = localStorage.getItem('byteOrderCart');
            if (storedCart) {
                try { orderCart.items = JSON.parse(storedCart); } catch {}
            } else {
                // Fallback: parse URL item lines (legacy / direct link)
                const urlItems = new URLSearchParams(window.location.search).get('items') || '';
                urlItems.split('\n').filter(l => l.startsWith('- ')).forEach(line => {
                    const m = line.match(/^- (.+?) \(€([\d.]+)\)/);
                    if (m) orderCart.items.push({ name: m[1], price: parseFloat(m[2]), foodGross: parseFloat(m[2]), beverageGross: 0 });
                });
            }
            onCartUpdate();

            document.getElementById('address-field').addEventListener('blur', updateDeliveryFee);

            const checkoutForm = document.getElementById('checkout-form');
            checkoutForm.addEventListener('submit', function(e) {
                e.preventDefault();
                if (checkoutForm.dataset.cashConfirmed) return;
                const orderType = document.getElementById('order-type-field').value;
                if (!orderType) {
                    alert('Please select Pickup or Delivery first!');
                    document.getElementById('fulfillment-selector').scrollIntoView({ behavior: 'smooth' });
                    return;
                }
                if (orderType === 'pickup') {
                    sessionStorage.setItem('byteOrderType', 'pickup');
                    openPaymentModal('pickup');
                } else {
                    if (!checkMinOrder()) return;
                    openPaymentModal('delivery');
                }
            });
        });

        // ── FULFILLMENT ──────────────────────────────────────────────────────
        function chooseFulfillment(type) {
            const orderTypeField = document.getElementById('order-type-field');
            const addressSection = document.getElementById('address-section');
            const addressField   = document.getElementById('address-field');
            const btnPickup      = document.getElementById('btn-pickup');
            const btnDelivery    = document.getElementById('btn-delivery');

            btnPickup.style.border     = '2px solid rgba(255,255,255,0.15)';
            btnPickup.style.background = 'rgba(255,127,0,0.08)';
            btnDelivery.style.border     = '2px solid rgba(255,255,255,0.15)';
            btnDelivery.style.background = 'rgba(255,127,0,0.08)';

            if (type === 'pickup') {
                orderTypeField.value = 'pickup';
                btnPickup.style.border     = '2px solid var(--primary)';
                btnPickup.style.background = 'rgba(255,127,0,0.2)';
                addressSection.style.display = 'none';
                addressField.value = 'PICKUP - Customer will collect at store';
                orderCart.deliveryFee = 0;
                onCartUpdate();
                document.getElementById('delivery-status').innerText = '';
            } else {
                orderTypeField.value = 'delivery';
                btnDelivery.style.border     = '2px solid var(--primary)';
                btnDelivery.style.background = 'rgba(255,127,0,0.2)';
                addressSection.style.display = '';
                addressField.value = '';
                addressField.focus();
            }
        }

        // ── SUBMIT ───────────────────────────────────────────────────────────
        async function submitFormViaAjax() {
            const form      = document.getElementById('checkout-form');
            const submitBtn = form.querySelector('.form-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Bestellung wird gesendet…';

            const orderType = sessionStorage.getItem('byteOrderType');
            const orderId   = 'BYT' + Math.random().toString(36).substr(2, 5).toUpperCase();
            sessionStorage.setItem('byteOrderId', orderId);

            const totals  = recalculateOrder();
            const distKm  = parseFloat(document.getElementById('items-field')?.dataset.distanceKm) || 0;
            const etaMins = distKm > 0 ? Math.round(10 + (distKm / 25) * 60) : 0;

            // ── Fiskaly TSE signing (non-blocking — order saves even if signing fails)
            let tseData = {};
            try {
                const signRes = await fetch('https://byte-production-4ab2.up.railway.app/api/sign-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId,
                        items_gross:    totals.items_gross,
                        net_food:       totals.net_food,
                        vat_7:          totals.vat_7,
                        net_bev:        totals.net_bev,
                        vat_19:         totals.vat_19,
                        delivery_gross: totals.delivery_gross,
                        total_vat:      totals.total_vat,
                        gross_total:    totals.gross_total,
                        payment_type:   'cash'
                    })
                });
                tseData = await signRes.json();
                if (tseData.signed) console.log('TSE signed:', tseData.tx_number);
            } catch(e) { console.warn('TSE signing skipped:', e.message); }

            try {
                await db.ref('orders/' + orderId).set({
                    status: 'confirmed', created_at: Date.now(), type: orderType,
                    name:    form.querySelector('[name="name"]')?.value || '',
                    phone:   form.querySelector('[name="phone"]')?.value || '',
                    address: document.getElementById('address-field')?.value || '',
                    items:   document.getElementById('items-field')?.value || '',
                    payment: document.getElementById('payment-field')?.value || '',
                    notes:   form.querySelector('[name="notes"]')?.value || '',
                    total:   totals.gross_total,
                    distance_km: distKm, eta_minutes: etaMins,
                    // TSE fields (empty if signing failed)
                    tse_signed:    tseData.signed || false,
                    tse_tx_id:     tseData.tx_id || '',
                    tse_tx_number: tseData.tx_number || 0,
                    tse_serial:    tseData.tss_serial || '',
                    tse_signature: tseData.signature || '',
                    tse_qr_data:   tseData.qr_data || ''
                });
            } catch(e) {}

            const formData = new FormData(form);
            formData.append('Order_ID', '#' + orderId);
            fetch('https://formsubmit.co/' + CONFIG.formsubmitEmail, {
                method: 'POST', body: formData,
                headers: { 'Accept': 'application/json' }, keepalive: true
            }).catch(() => {});

            window.location.href = 'thanks.html?oid=' + orderId + '&type=' + (orderType||'').toLowerCase() + '&v=' + Date.now();
        }

        function closeFulfillmentModal() {}  // kept for safety, no longer used

        function openPaymentModal(type) {
            document.getElementById('cash-pickup-section').style.display   = type === 'pickup'   ? '' : 'none';
            document.getElementById('cash-delivery-section').style.display = type === 'delivery' ? '' : 'none';
            document.getElementById('cash-modal').classList.add('active');
        }

        function closeCashModal() {
            document.getElementById('cash-modal').classList.remove('active');
        }

        // ── CARD PAYMENT (SumUp widget) ──────────────────────────────────────
        let sumupOrderId = null;

        async function payByCard() {
            const form      = document.getElementById('checkout-form');
            const orderType = document.getElementById('order-type-field').value;

            // Validate address for delivery
            if (orderType === 'delivery' || orderType === 'DELIVERY') {
                const addr = document.getElementById('address-field').value.trim();
                if (addr.length < 5) {
                    closeCashModal();
                    alert('Please enter your delivery address first!');
                    document.getElementById('address-field').focus();
                    return;
                }
                if (!checkMinOrder()) return;
            }

            const btn = document.getElementById('card-pay-btn');
            btn.disabled = true;
            btn.textContent = 'Wird vorbereitet…';

            const orderId = 'BYT' + Math.random().toString(36).substr(2, 5).toUpperCase();
            sumupOrderId  = orderId;
            const totals  = recalculateOrder();
            const distKm  = parseFloat(document.getElementById('items-field')?.dataset.distanceKm) || 0;
            const etaMins = distKm > 0 ? Math.round(10 + (distKm / 25) * 60) : 0;

            // Stash order data — used after widget confirms payment
            sessionStorage.setItem('byteOrderType', orderType || 'pickup');
            sessionStorage.setItem('byteOrderId',   orderId);
            sessionStorage.setItem('byteCardOrder', JSON.stringify({
                orderId, orderType: orderType || 'pickup',
                name:    form.querySelector('[name="name"]')?.value || '',
                phone:   form.querySelector('[name="phone"]')?.value || '',
                address: document.getElementById('address-field')?.value || '',
                items:   document.getElementById('items-field')?.value || '',
                notes:   form.querySelector('[name="notes"]')?.value || '',
                total:   totals.gross_total,
                distance_km: distKm, eta_minutes: etaMins
            }));

            try {
                const r = await fetch('https://byte-production-4ab2.up.railway.app/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        order_id:    orderId,
                        amount:      totals.gross_total,
                        description: 'BYTE Burgers Order ' + orderId,
                        return_url:  location.origin + '/thanks.html?oid=' + orderId +
                                     '&type=' + (orderType || 'pickup').toLowerCase() + '&card=1'
                    })
                });
                const data = await r.json();
                if (!data.ok || !data.checkout_id) throw new Error(data.reason || 'Payment setup failed');

                // Hide the button, show the widget container
                btn.style.display = 'none';
                document.getElementById('sumup-widget-container').style.display = 'block';

                // Load SumUp SDK and mount the card widget
                await loadScript('https://gateway.sumup.com/gateway/ecom/card/v2/sdk.js');
                SumUpCard.mount({
                    id:         'sumup-card',
                    checkoutId: data.checkout_id,
                    onResponse(type, body) {
                        if (type === 'success') {
                            onCardPaymentSuccess();
                        } else if (type === 'error' || type === 'fail') {
                            btn.style.display = '';
                            btn.disabled = false;
                            btn.textContent = '💳 Jetzt online mit Karte bezahlen';
                            document.getElementById('sumup-widget-container').style.display = 'none';
                            alert('Zahlung fehlgeschlagen. Bitte erneut versuchen.');
                        }
                    }
                });

            } catch (err) {
                btn.disabled = false;
                btn.style.display = '';
                btn.textContent = '💳 Jetzt online mit Karte bezahlen';
                document.getElementById('sumup-widget-container').style.display = 'none';
                alert('Kartenzahlung nicht verfügbar: ' + err.message + '\nBitte bar bezahlen.');
            }
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src; s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        async function onCardPaymentSuccess() {
            const orderRaw = sessionStorage.getItem('byteCardOrder');
            if (!orderRaw) {
                window.location.href = 'thanks.html?card=1';
                return;
            }
            const order = JSON.parse(orderRaw);
            sessionStorage.removeItem('byteCardOrder');

            // Save order to Firebase immediately (payment confirmed by widget)
            try {
                await db.ref('orders/' + order.orderId).set({
                    status: 'confirmed', created_at: Date.now(),
                    type:    order.orderType,
                    name:    order.name,    phone:   order.phone,
                    address: order.address, items:   order.items,
                    notes:   order.notes,
                    payment: 'CARD: Paid online via SumUp ✓',
                    total:   order.total,
                    distance_km: order.distance_km, eta_minutes: order.eta_minutes,
                    tse_signed: false, tse_tx_id: '', tse_tx_number: 0,
                    tse_serial: '', tse_signature: '', tse_qr_data: ''
                });
            } catch(e) { console.warn('Firebase save error:', e); }

            // Email notification
            fetch('https://formsubmit.co/' + CONFIG.formsubmitEmail, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    Order_ID: '#' + order.orderId, Name: order.name,
                    Phone: order.phone, Items: order.items, Address: order.address,
                    Payment: 'CARD — Paid online via SumUp',
                    Total: '€' + Number(order.total).toFixed(2)
                }), keepalive: true
            }).catch(() => {});

            window.location.href = 'thanks.html?oid=' + order.orderId +
                                   '&type=' + order.orderType.toLowerCase() + '&v=' + Date.now();
        }

        function setCashAmount(val) { processCashPayment(val); }

        function submitCustomCash() {
            const val = document.getElementById('custom-cash-input').value;
            if (!val || val <= 0) return alert('Please enter a valid cash amount.');
            processCashPayment(parseFloat(val));
        }

        function processCashPayment(inputVal) {
            const form        = document.getElementById('checkout-form');
            const hiddenField = document.getElementById('payment-field');
            const orderType   = document.getElementById('order-type-field').value;

            if (orderType === 'delivery' || orderType === 'DELIVERY') {
                const addr = document.getElementById('address-field').value.trim();
                if (addr.length < 5) {
                    closeCashModal();
                    alert('Please enter your delivery address before confirming!');
                    document.getElementById('address-field').focus();
                    return;
                }
                if (inputVal === 'Exact Change') {
                    hiddenField.value = "CASH: Exact Change provided.";
                } else {
                    const { gross_total } = recalculateOrder();
                    const change = parseFloat(inputVal) - gross_total;
                    if (change < 0) return alert(`That is not enough to cover the €${gross_total.toFixed(2)} bill!`);
                    hiddenField.value = `CASH: Paying with €${parseFloat(inputVal).toFixed(2)} (Driver must bring €${change.toFixed(2)} change)`;
                }
            } else {
                // Pickup — cash at store
                hiddenField.value = 'CASH: Pickup — Customer pays at store.';
            }

            form.dataset.cashConfirmed = 'true';
            closeCashModal();
            showUpsell();
        }

        // ── MIN ORDER ────────────────────────────────────────────────────────
        let minOrderAmount = 10;
        firebase.database().ref('settings/minOrder').once('value', snap => {
            if (snap.val()) minOrderAmount = parseFloat(snap.val());
        });

        function checkMinOrder() {
            if (document.getElementById('order-type-field').value !== 'delivery') return true;
            const { gross_total } = recalculateOrder();
            if (gross_total < minOrderAmount) {
                const needed = (minOrderAmount - gross_total).toFixed(2);
                alert(`Mindestbestellwert für Lieferung ist €${minOrderAmount.toFixed(2)}.\nNoch €${needed} fehlen. Bitte füge weitere Artikel hinzu.`);
                return false;
            }
            return true;
        }

        // ── UPSELL ───────────────────────────────────────────────────────────
        const ALL_BURGERS = ['goat byte','byte classic','double byte','smoky bbq','crispy chicken','spicy chicken','green byte','falafel byte','truffle','spicy goat'];
        const ALL_SIDES   = ['fries','onion ring','mozzarella','jalapeño','tender','currywurst'];
        const ALL_DRINKS  = ['soda','shake','water','cola','fanta','sprite','drink'];

        const UPSELL_POOL = {
            burger: [
                { name:'Byte Classic',        price:6.41, emoji:'🍔', desc:'Our most popular smash burger' },
                { name:'Crispy Chicken Byte', price:5.87, emoji:'🐔', desc:'Crispy chicken, coleslaw, pickles' },
                { name:'Green Byte (Vegan)',  price:5.87, emoji:'🥑', desc:'Plant-based, avocado, roasted peppers' },
            ],
            side: [
                { name:'Classic Fries',      price:2.66, emoji:'🍟', desc:'Crispy thin-cut fries' },
                { name:'Peri Peri Fries',    price:3.20, emoji:'🔥', desc:'With Peri Peri spice' },
                { name:'Crispy Onion Rings', price:4.80, emoji:'🧅', desc:'Beer-battered, 6 pcs' },
            ],
            drink: [
                { name:'Sodas',           price:2.68, emoji:'🥤', desc:'Coca-Cola / Fanta / Sprite' },
                { name:'Chocolate Shake', price:3.73, emoji:'🍫', desc:'Rich Belgian chocolate' },
                { name:'Vanilla Shake',   price:3.73, emoji:'🍦', desc:'Madagascar vanilla' },
                { name:'Strawberry Shake',price:3.73, emoji:'🍓', desc:'Fresh farm strawberries' },
            ],
        };

        function showUpsell() {
            const cartNames = orderCart.items.map(i => i.name.toLowerCase()).join(' ');
            const hasBurger = ALL_BURGERS.some(k => cartNames.includes(k));
            const hasSide   = ALL_SIDES.some(k => cartNames.includes(k));
            const hasDrink  = ALL_DRINKS.some(k => cartNames.includes(k));

            const offers = [];
            if (!hasBurger) offers.push(UPSELL_POOL.burger[Math.floor(Math.random() * UPSELL_POOL.burger.length)]);
            if (!hasSide)   offers.push(UPSELL_POOL.side[Math.floor(Math.random() * UPSELL_POOL.side.length)]);
            if (!hasDrink)  offers.push(UPSELL_POOL.drink[Math.floor(Math.random() * UPSELL_POOL.drink.length)]);

            const shown = offers.slice(0, 2);
            if (!shown.length) { submitFormViaAjax(); return; }

            let headline = 'Make it a meal? 🍔';
            if (!hasBurger && hasSide)            headline = 'Missing a burger? 🍔';
            else if (hasBurger && !hasSide && !hasDrink) headline = 'Add sides & a drink? 🍟';
            else if (hasBurger && !hasDrink)      headline = 'Add a drink? 🥤';
            else if (hasBurger && !hasSide)       headline = 'Add some sides? 🍟';

            document.getElementById('upsell-headline').textContent = headline;
            document.getElementById('upsell-offers').innerHTML = shown.map(u => `
                <div style="display:flex;align-items:center;justify-content:space-between;
                            background:rgba(255,127,0,0.07);border:1px solid rgba(255,127,0,0.2);
                            border-radius:14px;padding:.9rem 1rem;gap:.75rem">
                    <div style="display:flex;align-items:center;gap:.75rem">
                        <span style="font-size:1.6rem">${u.emoji}</span>
                        <div>
                            <div style="font-weight:800;font-size:.95rem">${u.name}</div>
                            <div style="font-size:.8rem;color:#888;margin-bottom:.2rem">${u.desc}</div>
                            <div style="color:#ff7f00;font-weight:700">+€${u.price.toFixed(2)}</div>
                        </div>
                    </div>
                    <button onclick="addUpsellItem('${u.name}',${u.price},'${u.emoji}')"
                            style="padding:.5rem 1.1rem;background:#ff7f00;color:#fff;border:none;
                                   border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;white-space:nowrap">
                        + Add
                    </button>
                </div>`).join('');
            document.getElementById('upsell-modal').style.display = 'flex';
        }

        function addUpsellItem(name, price, emoji) {
            // Push to cart — VAT is recalculated from scratch by onCartUpdate()
            const isBev = BEVERAGES_KW.some(k => name.toLowerCase().includes(k));
            orderCart.items.push({
                name: `${emoji} ${name}`,
                price,
                foodGross:     isBev ? 0 : price,
                beverageGross: isBev ? price : 0
            });
            onCartUpdate();
            event.target.closest('div[style]').remove();
            if (!document.getElementById('upsell-offers').children.length) closeUpsell();
        }

        function closeUpsell() {
            document.getElementById('upsell-modal').style.display = 'none';
            submitFormViaAjax();
        }
    </script>

<!-- UPSELL MODAL -->
<div id="upsell-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
     z-index:9999;align-items:flex-end;justify-content:center;">
    <div style="background:#13100a;border:1px solid rgba(255,127,0,0.2);border-radius:20px 20px 0 0;
                padding:1.5rem;width:100%;max-width:480px;">
        <div id="upsell-headline" style="font-size:1.1rem;font-weight:900;margin-bottom:.35rem">Make it a meal? 🍔</div>
        <div style="font-size:.85rem;color:#888;margin-bottom:1.25rem">Add these to your order before we send it</div>
        <div id="upsell-offers" style="display:flex;flex-direction:column;gap:.65rem;margin-bottom:1rem"></div>
        <button onclick="closeUpsell()"
                style="width:100%;padding:.85rem;background:rgba(255,255,255,0.06);
                       border:1px solid rgba(255,255,255,0.1);border-radius:12px;
                       color:#aaa;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer">
            No thanks, place order
        </button>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
