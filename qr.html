<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BYTE Burgers – Tisch QR Codes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ede8;
    font-family: 'Arial Black', Arial, sans-serif;
    padding: 2rem;
  }

  h2.page-title {
    text-align: center;
    font-size: 1.1rem;
    color: #555;
    font-weight: 700;
    margin-bottom: 1.5rem;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    justify-content: center;
  }

  /* ── CARD ─────────────────────────────────────────────────────────── */
  .card {
    background: #0d0a07;
    border-radius: 20px;
    width: 280px;
    padding: 1.6rem 1.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
    page-break-inside: avoid;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(255,127,31,.35) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo { width: 95px; }

  .table-badge {
    background: #ff7f1f;
    color: #fff;
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
    border-radius: 30px;
    padding: .35rem 1.2rem;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,127,31,.5), transparent);
  }

  .qr-wrap {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 20px rgba(255,127,31,.2);
  }

  .scan-label {
    color: #fff;
    font-size: .95rem;
    font-weight: 900;
    letter-spacing: .05em;
    text-align: center;
    text-transform: uppercase;
  }

  .scan-sub {
    color: rgba(255,255,255,.4);
    font-size: .68rem;
    text-align: center;
    letter-spacing: .02em;
    line-height: 1.5;
  }

  .url-pill {
    background: rgba(255,127,31,.12);
    border: 1px solid rgba(255,127,31,.3);
    border-radius: 30px;
    padding: .3rem .9rem;
    color: #ff9f5f;
    font-size: .68rem;
    letter-spacing: .04em;
  }

  .halal-row {
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .halal-row img { height: 22px; }
  .halal-text {
    color: rgba(255,255,255,.35);
    font-size: .6rem;
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  /* ── CONTROLS ─────────────────────────────────────────────────────── */
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin: 2rem 0 1rem;
    flex-wrap: wrap;
  }

  .btn {
    background: #ff7f1f;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .65rem 1.6rem;
    font-size: .88rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: .04em;
    text-transform: uppercase;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .btn.outline {
    background: transparent;
    border: 2px solid #ff7f1f;
    color: #ff7f1f;
  }

  /* ── PRINT ────────────────────────────────────────────────────────── */
  @media print {
    body { background: #fff; padding: .4cm; }
    .controls, .page-title { display: none; }
    .grid { gap: .8cm; }
    .card { box-shadow: none; border: 1px solid #ccc; width: 7cm; padding: .8cm; }
    .table-badge { font-size: .85rem; }
  }
</style>
</head>
<body>

<h2 class="page-title">🪑 Tisch QR Codes — BYTE Burgers Solingen</h2>

<div class="grid" id="cards-grid"></div>

<div class="controls">
  <button class="btn" onclick="window.print()">🖨️ Alle drucken</button>
</div>

<script>
  const BASE_URL = 'https://byteburgers.shop/order.html';
  const NUM_TABLES = 5;

  for (let t = 1; t <= NUM_TABLES; t++) {
    const url = BASE_URL + '?table=' + t;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="images/logo-white.png" alt="BYTE Burgers" class="logo"/>
      <div class="table-badge">🪑 Tisch ${t}</div>
      <div class="divider"></div>
      <p class="scan-label">Scan &amp; Bestellen</p>
      <div class="qr-wrap"><div id="qr-${t}"></div></div>
      <p class="scan-sub">Kamera auf den Code halten<br/>und direkt am Tisch bestellen</p>
      <div class="url-pill">byteburgers.shop · Tisch ${t}</div>
      <div class="halal-row">
        <img src="images/halal-badge.png" alt="Halal"/>
        <span class="halal-text">100 % Halal zertifiziert</span>
      </div>`;

    document.getElementById('cards-grid').appendChild(card);

    new QRCode(document.getElementById('qr-' + t), {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#1a0f05',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }
</script>
</body>
</html>
